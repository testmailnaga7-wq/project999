name: Javaworkflowevening
on:
   push:
     branches:
       - master
   workflow_dispatch:
permissions:
  id-token: write
  contents: read
jobs:
   build:
        runs-on: ubuntu-latest
        steps:

         - name: download the code from the githubto githubactions
           uses: actions/checkout@v4
         - uses: actions/setup-java@v5
           with:
              distribution: 'temurin' # See 'Supported distributions' for available options
              java-version: '25'
         - name: Check java installed or not
           run: java --version
         - name: Install Maven on ubuntulatest
           run: |
                sudo apt update -y
                sudo apt install maven -y 
         - name: Build the artifact
           run: mvn clean package
         - name: check that war file is available or not  
           run: ls -ltr target
         - name: store the artifact in the  current github action run 
           uses: actions/upload-artifact@v7
           with:
                name: abc.war
                path: target/*.war
           
         - name: Azure login
           uses: azure/login@v2
           with:
                client-id: ${{ secrets.AZURE_CLIENT_ID }}
                tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
                environment: 'AzureCloud'
                enable-AzPSSession: true
         - name: LoginSuccess
           run: echo "Login success"
          
         - uses: azure/webapps-deploy@v2
           with:
              app-name: 'webapp888'
              package: 'abc.war'  
